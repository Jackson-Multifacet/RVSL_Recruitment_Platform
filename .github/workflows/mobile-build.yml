name: Build Mobile Apps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build Web
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build Android App
        run: |
          cd android
          ./gradlew assembleDebug
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: rvsl-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Build iOS App (Derived Data Only)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -destination 'generic/platform=iOS' -derivedDataPath build
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: rvsl-ios-build
          path: ios/App/build
